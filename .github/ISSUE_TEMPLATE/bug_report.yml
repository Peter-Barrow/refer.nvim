name: Bug Report
description: Report a bug in refer.nvim
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        Please describe the bug clearly and concisely.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and detailed description of the bug.
      placeholder: |
        Example: When I press <space>f to open the Files picker, it crashes
        with an error about missing 'fd' command.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Minimal Reproducible Example
        Please test with the minimal config to verify this is not a plugin interaction issue.

        Run: `nvim -u .github/repro.lua`

        If the bug still occurs with the minimal config, please include:
        - The command you ran
        - Any custom configuration you used (if applicable)
        - Steps to reproduce the issue

  - type: input
    id: command
    attributes:
      label: Command that triggered the bug
      placeholder: "e.g., :Refer Files"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        1. First step
        2. Second step
        3. ...
      placeholder: "1. Open nvim with minimal config\n2. Press <space>f\n3. See error"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Expected vs Actual Behavior

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: "Expected the picker to open and show files."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead.
      placeholder: "The picker crashed with error: ..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Environment Information

  - type: input
    id: neovim-version
    attributes:
      label: Neovim Version
      placeholder: "e.g., v0.10.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 14.0, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: refer.nvim Version / Commit Hash
      description: "Run `git log -1 --oneline` in the plugin directory"
      placeholder: "e.g., v1.2.3 or abc1234"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Additional Context
        Add any other context about the problem here, such as:
        - Relevant settings in your Neovim config
        - Whether this worked in a previous version
        - Screenshots (drag and drop into the editor)
        - Error messages (copy-paste the full error)

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      placeholder: "Add any other context here..."

  - type: checkboxes
    id: checklist
    attributes:
      label: Verification
      options:
        - label: I have tested with the minimal config (`nvim -u .github/repro.lua`)
          required: true
        - label: I have searched for existing issues that describe this bug
          required: true